name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Build, typecheck, lint, test, audit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm

      - name: Install dependencies (frozen lockfile)
        run: pnpm install --frozen-lockfile

      - name: Cache mongodb-memory-server binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/mongodb-binaries
          key: mongodb-binaries-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            mongodb-binaries-${{ runner.os }}-

      - name: Build (workspace-aware — shared antes de api)
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test (apps/api, vitest + mongodb-memory-server)
        run: pnpm --filter @maria-matera/api test

      - name: Audit (producción — bloqueante en high/critical)
        run: pnpm audit --audit-level=high --prod

      - name: Audit (árbol completo, incluye devDependencies — informativo)
        run: pnpm audit --audit-level=high
        continue-on-error: true
